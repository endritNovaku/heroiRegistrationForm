<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Regjistrohu tek Heroi si profesionist</h2>

    <!-- User Info -->
    <input id="firstName" placeholder="Emri" style="text-align:center;" />
    <input id="lastName" placeholder="Mbiemri" style="text-align:center;" />
    <input id="email" placeholder="Email" type="email" style="text-align:center;" />
    <input id="phone" placeholder="Telefon" type="tel" style="text-align:center;" />
    <input id="password" type="password" placeholder="Fjalëkalimi" style="text-align:center;" />
    <!-- <input id="pfpUrl" placeholder="Foto e profilit" /> -->

    <hr>

    <!-- Provider Info -->
    <label style="align-self:center;">Profesioni</label>
    <select id="professionSelect" style="text-align:center;">
        <option value="">Loading professions...</option>
    </select>

    <input id="description" placeholder="Përshkrimi" style="text-align:center;" />
    <input id="providerAddress" placeholder="Adresa (p.sh. Rruga e Durrësit, Tirana)" autocomplete="off" oninput="showAddressSuggestions()" style="text-align:center;" />
    <div id="addressSuggestions" style="position:relative;align-self:stretch;"></div>

    <button onclick="registerProvider()" style="align-self:center;">Regjistrohu</button>

    <div class="status" id="status"></div>
</div>

    <script src="script.js"></script>

</body>
</html>
